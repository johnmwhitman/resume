work:
  - name: America's Car-Mart, Inc. (NASDAQ: CRMT)
    position: Director of Product Management
    location: Remote (Bentonville, Arkansas)
    startDate: '2025-01'
    url: https://www.car-mart.com/
    summary: >-
      Founded and lead the company's first Product Management organization,
      reporting to the CTO. Prior title at ACM: Business Research, Delivery
      & Product Director (May 2023 – Jan 2025). Built a 6-person PM/BA/UX/QA
      team and the company's first 14-person cross-functional Agile delivery
      squad. 8+ platforms delivered; four Board of Directors presentations.
    highlights:
      - >-
        AI collections platform (ALP) — first BHPH auto retailer to deploy AI
        voice agents as primary (not supplementary) servicers; 38% AI
        auto-resolve rate, 50%+ FTE reduction vs. all-human model,
        seven-figure annualized savings
      - >-
        Payments infrastructure overhaul — self-initiated modernization; ran
        6-vendor evaluation, implemented ACI Worldwide in Palantir Foundry as
        the seed of ACM's enterprise Ontology; $58M+ processed across
        200,000+ transactions; presented to the Board of Directors
      - >-
        Customer Account Center — ACM's first customer-facing Foundry
        application and first customer account platform in the company's
        40-year history; 75,000+ accounts, 50,000+ customers with card on
        file, AutoPay adoption exceeding industry benchmarks
      - >-
        Repairs Management System (Palantir Foundry) — end-to-end AI-enabled
        repair platform across 140 locations; launched April 2026; 200+
        repairs in week 1; $50M+ annual expense program
      - >-
        Palantir Pilot pre-beta client — among Palantir's first enterprise
        clients on Pilot before general availability; produced 18+
        end-to-end AI proof-of-concept applications with Palantir architects
        using AI FDE and AIP
      - >-
        $19M APP reserve capital recovery — inherited a program in crisis
        (1,900+ pending cases at peak); reduced to ~400/month recurring, cut
        cycle time from 90+ days to under 45, unlocked $19M in securitized
        reserve capital; weekly CEO and SLT reporting
      - >-
        SCRA compliance automation — 85% processing-time reduction
        (30 min → 5 min), $52K annual labor savings, federal compliance risk
        removed from 160+ dealerships
